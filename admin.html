<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UjenziSmart - Admin Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .pulse-green { animation: pulseGreen 2s infinite; }
        @keyframes pulseGreen { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 glass-panel p-6 rounded-3xl">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter">Command Center</h1>
                <p class="text-green-400 text-sm font-bold tracking-widest uppercase mt-1 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 pulse-green block"></span> Live Orders
                </p>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">Total Revenue (Paid)</p>
                <h2 id="total-revenue" class="text-2xl font-black text-white">TZS 0</h2>
            </div>
        </header>

        <div class="glass-panel rounded-3xl overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-700 bg-gray-800/50">
                            <th class="p-5 text-xs font-black uppercase tracking-widest text-gray-400">Order Info</th>
                            <th class="p-5 text-xs font-black uppercase tracking-widest text-gray-400">Customer</th>
                            <th class="p-5 text-xs font-black uppercase tracking-widest text-gray-400">Items</th>
                            <th class="p-5 text-xs font-black uppercase tracking-widest text-gray-400">Total Value</th>
                            <th class="p-5 text-xs font-black uppercase tracking-widest text-gray-400 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="admin-orders-feed" class="divide-y divide-gray-700/50">
                        <tr><td colspan="5" class="p-8 text-center text-gray-500 font-bold">Loading live orders...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // EXACT SAME CONFIG AS YOUR APP
        const firebaseConfig = { 
            apiKey: "AIzaSyCX2C1TXRb20nGtxEaYXGUo2KEH7gbZCY0", 
            authDomain: "ujenzismart-878af.firebaseapp.com", 
            projectId: "ujenzismart-878af", 
            storageBucket: "ujenzismart-878af.firebasestorage.app", 
            messagingSenderId: "626807014511", 
            appId: "1:626807014511:web:844e137d32048d6460399a",
            measurementId: "G-V8C9KKGKFY" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LISTEN TO EVERY ORDER IN REAL-TIME
        const q = query(collection(db, "orders"));
        
        onSnapshot(q, (snapshot) => {
            let orders = [];
            let totalRev = 0;

            snapshot.forEach((doc) => {
                const data = doc.data();
                orders.push({ id: doc.id, ...data });
                if(data.status === 'PAID') {
                    totalRev += data.total;
                }
            });

            // Sort by newest first using javascript
            orders.sort((a, b) => {
                const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                return timeB - timeA;
            });

            document.getElementById('total-revenue').textContent = `TZS ${totalRev.toLocaleString()}`;
            renderAdminTable(orders);
        });

        // RENDER THE UI
        function renderAdminTable(orders) {
            const feed = document.getElementById('admin-orders-feed');
            
            if(orders.length === 0) {
                feed.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500 font-bold">No orders found in database.</td></tr>`;
                return;
            }

            feed.innerHTML = orders.map(o => {
                const isPaid = o.status === 'PAID';
                
                // Status Badge Logic
                const statusBadge = isPaid 
                    ? `<span class="bg-green-500/20 text-green-400 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border border-green-500/30">PAID</span>`
                    : `<span class="bg-amber-500/20 text-amber-400 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border border-amber-500/30">PENDING</span>`;
                
                // Button Logic
                const actionBtn = isPaid
                    ? `<button onclick="toggleStatus('${o.id}', 'PENDING')" class="w-full py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors">Undo</button>`
                    : `<button onclick="toggleStatus('${o.id}', 'PAID')" class="w-full py-2 bg-green-500 hover:bg-green-400 text-white shadow-[0_0_15px_rgba(16,185,129,0.3)] rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors pulse-green">Mark Paid</button>`;

                return `
                <tr class="hover:bg-white/5 transition-colors">
                    <td class="p-5">
                        <p class="font-black text-sm text-white">${o.orderId}</p>
                        <p class="text-[10px] text-gray-400 font-bold mt-1">${o.dateString}</p>
                        <div class="mt-2">${statusBadge}</div>
                    </td>
                    <td class="p-5">
                        <p class="font-bold text-sm text-blue-300">${o.userName}</p>
                        <p class="text-[10px] text-gray-500 mt-0.5">${o.userEmail || 'No email'}</p>
                    </td>
                    <td class="p-5 max-w-xs">
                        <p class="text-xs text-gray-300 leading-relaxed">${o.items}</p>
                    </td>
                    <td class="p-5">
                        <p class="font-black text-white text-lg">TZS ${o.total.toLocaleString()}</p>
                        <p class="text-[10px] text-gray-500 font-bold mt-1">Trans: TZS ${o.transport.toLocaleString()}</p>
                    </td>
                    <td class="p-5 align-middle">
                        ${actionBtn}
                    </td>
                </tr>`;
            }).join('');
        }

        // 🌟 THE MAGIC SWITCH 🌟
        window.toggleStatus = async function(docId, newStatus) {
            try {
                const orderRef = doc(db, "orders", docId);
                await updateDoc(orderRef, {
                    status: newStatus
                });
                console.log(`Order ${docId} successfully changed to ${newStatus}`);
            } catch (error) {
                console.error("Error updating order:", error);
                alert("Failed to update status. Check console.");
            }
        };
    </script>
</body>
</html>
