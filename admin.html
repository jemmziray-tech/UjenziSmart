<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UjenziSmart - Master Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = { darkMode: 'class' }
        function applyTheme() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyTheme();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        /* 🟢 MODIFIED: Made body adaptive to light/dark mode */
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        .bg-cyber { background: radial-gradient(circle at top right, #0f172a 0%, #020617 100%); }
        
        /* 🟢 MODIFIED: Glass panel adjusts based on theme */
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        .neon-border-green { border-left: 4px solid #10b981; box-shadow: -10px 0 20px -10px rgba(16, 185, 129, 0.3); }
        .neon-border-amber { border-left: 4px solid #f59e0b; box-shadow: -10px 0 20px -10px rgba(245, 158, 11, 0.3); }
        
        .tab-active { color: #10b981; border-bottom: 3px solid #10b981; background: rgba(16, 185, 129, 0.05); }
        
        @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-dot { animation: glow 2s ease-in-out infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen bg-[#f4f6f9] text-gray-900 dark:bg-cyber dark:text-white">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-gray-900 to-gray-500 dark:from-white dark:to-gray-500">
                    Control Panel
                </h1>
                <div class="flex items-center gap-3 mt-2">
                    <span class="px-3 py-1 bg-green-500/10 text-green-600 dark:text-green-500 text-[10px] font-black uppercase tracking-widest rounded-full border border-green-500/20 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full pulse-dot"></span> System Live
                    </span>
                    <span id="admin-email-tag" class="text-xs font-bold text-gray-500 uppercase tracking-tighter">Checking Auth...</span>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 w-full md:w-auto">
                    <div class="glass-panel p-4 rounded-2xl border-b-2 border-green-500/50">
                        <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Gross Revenue</p>
                        <h2 id="total-revenue" class="text-xl font-black text-gray-900 dark:text-white mt-1">TZS 0</h2>
                    </div>
                    <div class="glass-panel p-4 rounded-2xl border-b-2 border-blue-500/50">
                        <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Active Orders</p>
                        <h2 id="order-count" class="text-xl font-black text-gray-900 dark:text-white mt-1">0</h2>
                    </div>
                    <div class="glass-panel p-4 rounded-2xl border-b-2 border-amber-500/50 hidden md:block">
                        <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Payout Requests</p>
                        <h2 id="payout-count" class="text-xl font-black text-amber-500 dark:text-amber-400 mt-1">0</h2>
                    </div>
                </div>

                <button onclick="switchTheme()" class="w-12 h-12 bg-white dark:bg-gray-900 rounded-full flex items-center justify-center shadow-md dark:shadow-inner border border-gray-200 dark:border-gray-700 transition-colors">
                    <svg id="icon-sun" style="display:none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-amber-500"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-2.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>
                    <svg id="icon-moon" style="display:none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-blue-500 dark:text-blue-400"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
                </button>
            </div>
        </header>

        <div class="flex gap-2 mb-6 overflow-hidden rounded-2xl p-1 bg-gray-200 dark:bg-white/5 border border-gray-300 dark:border-white/5 w-fit transition-colors">
            <button onclick="switchTab('orders')" id="btn-orders" class="px-6 py-3 text-xs font-black uppercase tracking-widest transition-all rounded-xl tab-active">
                🛒 Sales Flow
            </button>
            <button onclick="switchTab('payouts')" id="btn-payouts" class="px-6 py-3 text-xs font-black uppercase tracking-widest transition-all rounded-xl text-gray-500 hover:text-gray-900 dark:hover:text-white">
                💰 Payouts
            </button>
        </div>

        <div id="view-orders" class="stagger-item">
            <div class="glass-panel rounded-[2.5rem] overflow-hidden">
                <div class="overflow-x-auto overflow-y-auto max-h-[60vh]">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-gray-100 dark:bg-[#0f172a] z-10 transition-colors">
                            <tr class="border-b border-gray-200 dark:border-white/5">
                                <th class="p-6 text-[10px] font-black uppercase tracking-widest text-gray-500">Order & Status</th>
                                <th class="p-6 text-[10px] font-black uppercase tracking-widest text-gray-500">Customer Intelligence</th>
                                <th class="p-6 text-[10px] font-black uppercase tracking-widest text-gray-500">Inventory Logic</th>
                                <th class="p-6 text-[10px] font-black uppercase tracking-widest text-gray-500">Net Value</th>
                                <th class="p-6 text-[10px] font-black uppercase tracking-widest text-gray-500 text-center">Executive Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-orders-feed" class="divide-y divide-gray-200 dark:divide-white/5">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="view-payouts" class="hidden stagger-item">
            <div class="grid grid-cols-1 gap-4" id="payout-requests-feed">
            </div>
        </div>
    </div>

    <script>
        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const sun = document.getElementById('icon-sun');
            const moon = document.getElementById('icon-moon');
            if(sun && moon) {
                sun.style.display = isDark ? 'block' : 'none';
                moon.style.display = isDark ? 'none' : 'block';
            }
        }
        function switchTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            updateThemeIcon();
        }
        document.addEventListener("DOMContentLoaded", updateThemeIcon);
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        // 🟢 ADDED: serverTimestamp imported below
        import { getFirestore, collection, query, onSnapshot, doc, updateDoc, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCX2C1TXRb20nGtxEaYXGUo2KEH7gbZCY0", 
            authDomain: "ujenzismart-878af.firebaseapp.com", 
            projectId: "ujenzismart-878af", 
            storageBucket: "ujenzismart-878af.firebasestorage.app", 
            messagingSenderId: "626807014511", 
            appId: "1:626807014511:web:844e137d32048d6460399a",
            measurementId: "G-V8C9KKGKFY" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const MASTER_ADMIN = "jem.mziray@gmail.com"; 

        // SECURE AUTH CHECK
        onAuthStateChanged(auth, (user) => {
            if (user && (user.email === MASTER_ADMIN || user.email === "venancechesco58@gmail.com")) {
                document.getElementById('admin-email-tag').textContent = user.email;
                startDataSync();
            } else {
                alert("Restricted Access. Admins Only.");
                window.location.href = "index.html";
            }
        });

        function startDataSync() {
            // 🔄 SYNC CLIENT ORDERS
            const ordersQ = query(collection(db, "orders"), orderBy("createdAt", "desc"));
            onSnapshot(ordersQ, (snapshot) => {
                let orders = [];
                let revenue = 0;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    orders.push({id: doc.id, ...data});
                    if(data.status === 'PAID' || data.status === 'SUCCESS') revenue += data.total;
                });
                document.getElementById('total-revenue').textContent = `TZS ${revenue.toLocaleString()}`;
                document.getElementById('order-count').textContent = orders.length;
                renderOrders(orders);
            });

            // 🔄 SYNC PAYOUT REQUESTS
            const payoutQ = query(collection(db, "payouts"), orderBy("createdAt", "desc"));
            onSnapshot(payoutQ, (snapshot) => {
                let payouts = [];
                snapshot.forEach(doc => payouts.push({id: doc.id, ...doc.data()}));
                document.getElementById('payout-count').textContent = payouts.filter(p => p.status === "PENDING").length;
                renderPayouts(payouts);
            });
        }

        function renderOrders(orders) {
            const feed = document.getElementById('admin-orders-feed');
            if(orders.length === 0) {
                feed.innerHTML = `<tr><td colspan="5" class="p-12 text-center text-gray-500 font-bold">Zero system transactions.</td></tr>`;
                return;
            }
            feed.innerHTML = orders.map(o => {
                const isPaid = o.status === 'PAID' || o.status === 'SUCCESS';
                return `
                <tr class="hover:bg-gray-50 dark:hover:bg-white/[0.02] transition-colors border-l-4 ${isPaid ? 'border-green-500' : 'border-amber-500'}">
                    <td class="p-6">
                        <p class="font-black text-gray-900 dark:text-white tracking-widest text-sm">${o.orderId || 'UNNAMED'}</p>
                        <p class="text-[10px] text-gray-500 font-bold mt-1">${o.dateString || 'Recently'}</p>
                        <div class="mt-3">
                            <span class="${isPaid ? 'text-green-700 bg-green-100 dark:text-green-400 dark:bg-green-400/10' : 'text-amber-700 bg-amber-100 dark:text-amber-400 dark:bg-amber-400/10'} px-2 py-1 rounded text-[9px] font-black border border-white/5 uppercase">${o.status}</span>
                        </div>
                    </td>
                    <td class="p-6">
                        <p class="font-bold text-sm text-gray-800 dark:text-gray-200">${o.userName || 'Anonymous'}</p>
                        <p class="text-[10px] text-gray-500 mt-1">${o.userEmail || 'No Digital ID'}</p>
                    </td>
                    <td class="p-6">
                        <p class="text-xs text-gray-500 dark:text-gray-400 leading-relaxed max-w-[200px] italic">"${o.items || 'No data'}"</p>
                    </td>
                    <td class="p-6">
                        <p class="font-black text-gray-900 dark:text-white text-base">TZS ${o.total.toLocaleString()}</p>
                        <p class="text-[10px] text-gray-500 mt-1">Fee: TZS ${o.transport.toLocaleString()}</p>
                    </td>
                    <td class="p-6 text-center">
                        <button onclick="updateStatus('orders', '${o.id}', '${isPaid ? 'PENDING' : 'PAID'}')" class="px-6 py-3 ${isPaid ? 'bg-gray-200 text-gray-500 dark:bg-white/5 dark:text-gray-400' : 'bg-green-600 text-white shadow-[0_0_20px_rgba(16,185,129,0.4)]'} rounded-xl text-[10px] font-black uppercase tracking-widest transition-all hover:scale-105 active:scale-95">
                            ${isPaid ? 'Undo' : 'Mark Final'}
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderPayouts(payouts) {
            const feed = document.getElementById('payout-requests-feed');
            if(payouts.length === 0) {
                feed.innerHTML = `<div class="p-20 text-center text-gray-500 font-bold glass-panel rounded-[2.5rem]">No payout requests in the queue.</div>`;
                return;
            }
            feed.innerHTML = payouts.map(p => {
                const isPaid = p.status === 'PAID';
                return `
                <div class="glass-panel p-6 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-6 border-l-4 ${isPaid ? 'border-green-500' : 'border-amber-500'}">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <h4 class="text-lg font-black text-gray-900 dark:text-white">${p.supplierName}</h4>
                            <span class="text-[9px] font-black px-2 py-1 bg-gray-100 dark:bg-white/5 rounded border border-gray-200 dark:border-white/5 uppercase text-gray-500 dark:text-gray-400 tracking-tighter">Supplier ID: ${p.supplierId.slice(0,8)}</span>
                        </div>
                        <p class="text-xs text-gray-500 font-bold uppercase tracking-widest mb-4">Request for TZS <span class="text-green-600 dark:text-green-500 text-sm font-black">${p.amount.toLocaleString()}</span></p>
                        <div class="bg-gray-50 dark:bg-black/40 p-4 rounded-2xl border border-gray-200 dark:border-white/5">
                            <p class="text-[10px] text-gray-500 dark:text-gray-600 font-black uppercase mb-1">Settlement Channel</p>
                            <p class="text-sm font-mono text-blue-600 dark:text-blue-400">${p.accountDetails}</p>
                        </div>
                    </div>
                    <div class="flex flex-col items-center gap-3">
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">${p.createdAt?.toDate().toLocaleDateString() || 'Pending Date'}</p>
                        ${isPaid ? 
                            `<span class="px-8 py-4 bg-green-100 text-green-700 dark:bg-green-500/20 dark:text-green-500 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-green-200 dark:border-green-500/20">✅ System Settled</span>` :
                            `<button onclick="updateStatus('payouts', '${p.id}', 'PAID')" class="px-8 py-4 bg-amber-500 hover:bg-amber-400 text-black rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-amber-500/20 active:scale-95 transition-all">Settle Payment</button>`
                        }
                    </div>
                </div>`;
            }).join('');
        }

        // TAB SWITCHER
        window.switchTab = (tab) => {
            document.getElementById('view-orders').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('view-payouts').classList.toggle('hidden', tab !== 'payouts');
            
            document.getElementById('btn-orders').className = `px-6 py-3 text-xs font-black uppercase tracking-widest transition-all rounded-xl ${tab === 'orders' ? 'tab-active' : 'text-gray-500 dark:hover:text-white hover:text-gray-900'}`;
            document.getElementById('btn-payouts').className = `px-6 py-3 text-xs font-black uppercase tracking-widest transition-all rounded-xl ${tab === 'payouts' ? 'tab-active' : 'text-gray-500 dark:hover:text-white hover:text-gray-900'}`;
        };

        // SHARED UPDATE LOGIC
        window.updateStatus = async (collectionName, docId, newStatus) => {
            const confirmMsg = collectionName === 'orders' ? "Update order status?" : "Confirm you have physically sent the money?";
            if(!confirm(confirmMsg)) return;

            try {
                // 🟢 ADDED: serverTimestamp() to log the exact time you settled the payout
                await updateDoc(doc(db, collectionName, docId), { status: newStatus, processedAt: serverTimestamp() });
                console.log("Success: Ledger Updated.");
            } catch(e) {
                console.error(e);
                alert("Permission error. Check Firebase Rules.");
            }
        };
    </script>
</body>
</html>
