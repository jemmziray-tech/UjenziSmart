<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UjenziSmart - Supplier Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        function applyTheme() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyTheme();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .click-press { transition: transform 0.1s ease; }
        .click-press:active { transform: scale(0.96); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="min-h-screen bg-[#f4f6f9] dark:bg-[#0f172a] text-gray-800 dark:text-gray-100 transition-colors duration-300 p-4 md:p-8">

    <div id="login-screen" class="fixed inset-0 z-50 bg-[#020617] flex items-center justify-center p-6 text-white transition-opacity duration-500">
        <div class="w-full max-w-md glass-panel p-10 rounded-[3rem] shadow-2xl text-center">
            <h1 class="text-3xl font-black mb-10 tracking-tight">Supplier Login</h1>
            <button id="google-login-btn" class="w-full py-4 bg-white text-gray-800 rounded-2xl font-black flex items-center justify-center gap-3 click-press shadow-xl">Authenticate with Google</button>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden w-full max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white dark:bg-gray-800 p-6 rounded-[2.5rem] shadow-sm transition-colors border border-gray-100 dark:border-white/5">
            <div class="flex items-center gap-4 cursor-pointer" onclick="openProfileSettings()">
                <img id="header-avatar" class="w-14 h-14 rounded-full border-2 border-green-500 object-cover">
                <div><h1 class="text-xl font-black">Vendor Hub</h1><p id="supplier-name" class="text-xs font-bold text-gray-500 uppercase"></p></div>
            </div>
            <div class="flex gap-3">
                <button onclick="switchTheme()" class="w-12 h-12 bg-gray-50 dark:bg-white/5 rounded-full flex items-center justify-center click-press shadow-inner">
                    <svg id="icon-sun" style="display:none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-amber-500"><path d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-2.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>
                    <svg id="icon-moon" style="display:none;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-blue-400"><path d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
                </button>
                <button id="logout-btn" class="w-12 h-12 bg-red-50 dark:bg-red-900/20 text-red-500 rounded-full flex items-center justify-center font-bold text-lg click-press">🚪</button>
            </div>
        </header>

        <div class="bg-gray-900 dark:bg-green-950/20 p-8 rounded-[2.5rem] text-white mb-8 border border-white/5">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">Available to Withdraw</p>
            <h3 id="wallet-balance" class="text-4xl font-black">TZS 0</h3>
            <button onclick="requestPayout()" class="mt-6 w-full md:w-auto bg-green-500 px-10 py-4 rounded-2xl font-black text-xs uppercase click-press shadow-lg">💳 Request Payout</button>
        </div>

        <div class="bg-white dark:bg-gray-800 p-6 rounded-[2.5rem] mb-8 border dark:border-white/5">
            <h3 class="text-[10px] font-black mb-4 uppercase text-gray-400">Withdrawal History</h3>
            <div id="payout-history-list" class="space-y-3 max-h-40 overflow-y-auto pr-2"></div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl border dark:border-white/5"><p class="text-[9px] text-gray-400 font-bold uppercase">Total Revenue</p><h3 id="stat-revenue" class="text-xl font-black">TZS 0</h3></div>
            <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl border dark:border-white/5"><p class="text-[9px] text-gray-400 font-bold uppercase">Units Sold</p><h3 id="stat-units" class="text-xl font-black">0</h3></div>
            <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl border dark:border-white/5"><p class="text-[9px] text-gray-400 font-bold uppercase">Active Items</p><h3 id="stat-active" class="text-xl font-black">0</h3></div>
            <div class="bg-white dark:bg-gray-800 p-5 rounded-3xl border dark:border-white/5"><p class="text-[9px] text-gray-400 font-bold uppercase">Top Product</p><h3 id="stat-top-product" class="text-xs font-black truncate">-</h3></div>
        </div>

        <div class="bg-white dark:bg-gray-800 p-6 rounded-[2.5rem] mb-8 border dark:border-white/5"><canvas id="revenueChart" height="200"></canvas></div>

        <div class="bg-white dark:bg-gray-800 p-8 rounded-[2.5rem] mb-8 border dark:border-white/5">
            <h2 class="text-lg font-black mb-6">➕ Add New Product</h2>
            <form id="add-product-form" class="space-y-5">
                <input type="text" id="prod-name" required class="w-full bg-gray-50 dark:bg-gray-900 border dark:border-gray-700 rounded-2xl px-5 py-4 text-sm font-bold" placeholder="Product Name">
                <div class="flex gap-4">
                    <input type="number" id="prod-price" required class="w-full bg-gray-50 dark:bg-gray-900 border dark:border-gray-700 rounded-2xl px-5 py-4 text-sm font-bold" placeholder="Price">
                    <input type="number" id="prod-weight" required class="w-full bg-gray-50 dark:bg-gray-900 border dark:border-gray-700 rounded-2xl px-5 py-4 text-sm font-bold" placeholder="Weight">
                </div>
                <input type="file" id="prod-image" accept="image/*" required class="w-full text-xs">
                <button type="submit" id="submit-btn" class="w-full py-5 bg-gray-900 dark:bg-green-600 text-white rounded-2xl font-black uppercase">Publish Product</button>
            </form>
        </div>

        <div id="inventory-list" class="space-y-4"></div>
    </div>

    <div id="profile-modal" class="fixed inset-0 z-[200] hidden bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-900 w-full max-w-sm rounded-[2.5rem] p-8">
            <button onclick="closeProfileSettings()" class="float-right font-bold opacity-50">✕</button>
            <h3 class="text-xl font-black text-center mb-6">Profile Settings</h3>
            <div class="flex flex-col items-center mb-6" onclick="document.getElementById('modal-profile-upload').click()">
                <img id="modal-avatar-preview" class="w-24 h-24 rounded-full object-cover border-4 border-green-500 cursor-pointer">
                <input type="file" id="modal-profile-upload" class="hidden" accept="image/*" onchange="previewProfileImage(event)">
            </div>
            <input type="text" id="edit-name-input" class="w-full bg-gray-50 dark:bg-gray-800 p-4 rounded-2xl font-bold mb-6" placeholder="Your Name">
            <button onclick="saveProfileSettings()" id="save-profile-btn" class="w-full py-4 bg-green-600 text-white rounded-2xl font-black uppercase">Save Identity</button>
        </div>
    </div>

    <div id="edit-product-modal" class="fixed inset-0 z-[200] hidden bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-gray-900 w-full max-w-md rounded-[2.5rem] p-8">
            <button onclick="closeEditModal()" class="float-right font-bold opacity-50">✕</button>
            <h3 class="text-xl font-black mb-6">Quick Edit</h3>
            <input type="hidden" id="edit-doc-id">
            <input type="text" id="quick-edit-name" class="w-full bg-gray-50 dark:bg-gray-800 p-4 rounded-xl font-bold mb-4">
            <div class="flex gap-4 mb-6">
                <input type="number" id="quick-edit-price" class="w-full bg-gray-50 dark:bg-gray-800 p-4 rounded-xl font-bold">
                <input type="number" id="quick-edit-weight" class="w-full bg-gray-50 dark:bg-gray-800 p-4 rounded-xl font-bold">
            </div>
            <button onclick="saveEditedProduct()" id="save-edit-btn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase">Update Live Details</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, updateDoc, serverTimestamp, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyCX2C1TXRb20nGtxEaYXGUo2KEH7gbZCY0", authDomain: "ujenzismart-878af.firebaseapp.com", projectId: "ujenzismart-878af", storageBucket: "ujenzismart-878af.firebasestorage.app", messagingSenderId: "626807014511", appId: "1:626807014511:web:844e137d32048d6460399a" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const APPROVED_SUPPLIERS = ["jem.mziray@gmail.com", "venancechesco58@gmail.com"];

        onAuthStateChanged(auth, async (user) => {
            if (user && APPROVED_SUPPLIERS.includes(user.email)) {
                loginScreen.classList.add('hidden');
                dashboardScreen.classList.remove('hidden');
                updateHeaderUI(user);
                listenToInventory(user.uid);
                listenToPayouts(user.uid);
            } else { loginScreen.classList.remove('hidden'); dashboardScreen.classList.add('hidden'); }
        });

        document.getElementById('google-login-btn').onclick = async () => { await signInWithPopup(auth, provider); };
        document.getElementById('logout-btn').onclick = async () => { await signOut(auth); };

        window.requestPayout = async function() {
            const current = parseInt(document.getElementById('wallet-balance').textContent.replace(/[^0-9]/g, ''));
            if(current <= 0) return alert("Zero balance.");
            const amt = prompt("Amount:"); const details = prompt("M-Pesa details:");
            if(amt && details) await addDoc(collection(db, "payouts"), { supplierId: auth.currentUser.uid, supplierName: auth.currentUser.displayName, amount: Number(amt), accountDetails: details, status: "PENDING", createdAt: serverTimestamp() });
        }

        function listenToPayouts(uid) {
            onSnapshot(query(collection(db, "payouts"), where("supplierId", "==", uid), orderBy("createdAt", "desc")), (snap) => {
                let paid = 0;
                document.getElementById('payout-history-list').innerHTML = snap.docs.map(d => {
                    const p = d.data(); if(p.status === "PAID") paid += p.amount;
                    return `<div class="flex justify-between p-3 bg-gray-50 dark:bg-white/5 rounded-xl border dark:border-white/10">
                        <div><p class="text-xs font-black">TZS ${p.amount.toLocaleString()}</p></div>
                        <span class="text-[8px] font-black px-2 py-1 rounded uppercase ${p.status==='PAID' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${p.status}</span>
                    </div>`;
                }).join('') || "No history.";
                window.totalPaidOut = paid;
            });
        }

        window.saveEditedProduct = async function() {
            await updateDoc(doc(db, "products", document.getElementById('edit-doc-id').value), { name: document.getElementById('quick-edit-name').value, price: Number(document.getElementById('quick-edit-price').value), weight: Number(document.getElementById('quick-edit-weight').value) });
            closeEditModal();
        }

        async function fetchAndCalculateStats(products) {
            const snap = await getDocs(collection(db, "orders"));
            let rev = 0; let units = 0; let productStats = {}; let daily = {};
            for(let i=6; i>=0; i--) { const d = new Date(); d.setDate(d.getDate()-i); daily[d.toLocaleDateString('en-US', {weekday:'short'})] = 0; }
            products.forEach(p => productStats[p.name] = { sold:0, rev:0 });
            snap.forEach(d => {
                const o = d.data(); if(o.status === "SUCCESS" || o.status === "PAID") {
                    products.forEach(p => {
                        const m = (o.items || "").match(new RegExp(`${p.name.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&')}\\s*\\(x(\\d+)\\)`, 'i'));
                        if(m) { const q = parseInt(m[1]); rev += q*p.price; units += q; productStats[p.name].sold += q; if(o.createdAt) daily[o.createdAt.toDate().toLocaleDateString('en-US', {weekday:'short'})] += q*p.price; }
                    });
                }
            });
            const bal = rev - (window.totalPaidOut || 0);
            document.getElementById('stat-revenue').textContent = `TZS ${rev.toLocaleString()}`;
            document.getElementById('wallet-balance').textContent = `TZS ${bal.toLocaleString()}`;
            document.getElementById('stat-units').textContent = units;
            renderChart(Object.keys(daily).map(k => ({ date: k, amount: daily[k] })));
        }

        function listenToInventory(uid) {
            onSnapshot(query(collection(db, "products"), where("supplierId", "==", uid)), (snap) => {
                const arr = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('stat-active').textContent = arr.length;
                fetchAndCalculateStats(arr);
                document.getElementById('inventory-list').innerHTML = arr.map(p => `
                    <div class="flex items-center gap-4 p-4 bg-white dark:bg-gray-800 rounded-3xl border dark:border-white/5">
                        <img src="${p.img}" class="w-16 h-16 rounded-2xl object-cover">
                        <div class="flex-grow"><p class="font-black">${p.name}</p><p class="text-green-600 font-bold">TZS ${p.price.toLocaleString()}</p></div>
                        <div class="flex gap-2">
                            <button onclick="openEditModal('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price}, ${p.weight})" class="p-3 bg-blue-500/10 text-blue-500 rounded-xl">✏️</button>
                            <button onclick="deleteProduct('${p.id}')" class="p-3 bg-red-500/10 text-red-500 rounded-xl">🗑️</button>
                        </div>
                    </div>`).join('');
            });
        }
        window.deleteProduct = async (id) => { if(confirm("Remove?")) await deleteDoc(doc(db, "products", id)); };
        document.getElementById('add-product-form').onsubmit = async (e) => {
            e.preventDefault(); const file = document.getElementById('prod-image').files[0];
            const refImg = ref(storage, 'products/' + Date.now() + file.name);
            await uploadBytes(refImg, file); const url = await getDownloadURL(refImg);
            await addDoc(collection(db, "products"), { supplierId: auth.currentUser.uid, supplierName: auth.currentUser.displayName, name: document.getElementById('prod-name').value, price: Number(document.getElementById('prod-price').value), weight: Number(document.getElementById('prod-weight').value), img: url, status: "LIVE", createdAt: serverTimestamp() });
            alert("Live!");
        };

        function renderChart(data) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            if(window.revenueChartInstance) window.revenueChartInstance.destroy();
            window.revenueChartInstance = new Chart(ctx, { type: 'line', data: { labels: data.map(d => d.date), datasets: [{ data: data.map(d => d.amount), borderColor: '#10b981', tension: 0.4, fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)' }] }, options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } } });
        }
        function updateHeaderUI(user) { const src = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName)}&background=10b981&color=fff`; document.getElementById('header-avatar').src = src; document.getElementById('modal-avatar-preview').src = src; document.getElementById('supplier-name').textContent = user.displayName; document.getElementById('edit-name-input').value = user.displayName; }
        window.saveProfileSettings = async function() { const user = auth.currentUser; let url = user.photoURL; if(newProfileImageFile) { const r = ref(storage, 'avatars/' + user.uid); await uploadBytes(r, newProfileImageFile); url = await getDownloadURL(r); } await updateProfile(user, { displayName: document.getElementById('edit-name-input').value, photoURL: url }); updateHeaderUI(auth.currentUser); closeProfileSettings(); };
    </script>
</body>
</html>
