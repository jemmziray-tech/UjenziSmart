<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UjenziSmart - Supplier Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; color: #1f2937; }
        
        /* Premium Tech Background for Login */
        .bg-deep-tech { background: radial-gradient(circle at top right, #112347 0%, #030814 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        
        .click-press { transition: transform 0.1s ease; }
        .click-press:active { transform: scale(0.96); }
        
        /* Subtle pulse for the secure lock icon */
        @keyframes subtlePulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.95); } }
        .animate-secure { animation: subtlePulse 3s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-[#f4f6f9]">

    <div id="login-screen" class="fixed inset-0 z-50 bg-deep-tech flex flex-col items-center justify-center p-6 text-white transition-opacity duration-500">
        
        <div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-green-500/20 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-96 h-96 bg-blue-500/20 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="w-full max-w-md glass-panel p-10 rounded-[2.5rem] shadow-2xl text-center relative z-10">
            <div class="w-20 h-20 bg-gradient-to-br from-green-400 to-green-600 rounded-full mx-auto flex items-center justify-center shadow-lg mb-6 animate-secure border-4 border-white/10">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10 text-white"><path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3c0-2.9-2.35-5.25-5.25-5.25Zm3.75 8.25v-3a3.75 3.75 0 1 0-7.5 0v3h7.5Z" clip-rule="evenodd" /></svg>
            </div>
            
            <h1 class="text-3xl font-black mb-2 tracking-tight">Vendor Portal</h1>
            <p class="text-blue-100/70 mb-10 text-sm font-medium">Secure access for authorized UjenziSmart suppliers.</p>
            
            <button id="google-login-btn" class="w-full py-4 bg-white hover:bg-gray-50 text-gray-800 rounded-2xl font-black flex items-center justify-center gap-3 click-press shadow-[0_10px_25px_rgba(0,0,0,0.2)] transition-all">
                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Authenticate with Google
            </button>
            
            <p class="text-[10px] text-gray-400 mt-8 uppercase tracking-widest font-bold">Encrypted Connection</p>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden w-full max-w-3xl py-8 px-4">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600 text-xl font-black">🏢</div>
                <div>
                    <h1 class="text-xl font-black text-gray-800">Inventory Manager</h1>
                    <p id="supplier-name" class="text-xs font-bold text-gray-500 mt-0.5"></p>
                </div>
            </div>
            <button id="logout-btn" class="text-xs font-bold text-red-500 hover:bg-red-50 px-5 py-3 rounded-xl transition-colors flex items-center gap-2 click-press">
                <span>Logout</span>🚪
            </button>
        </header>

        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100 mb-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-green-50 rounded-full blur-[40px] pointer-events-none"></div>
            <h2 class="text-lg font-black mb-6 flex items-center gap-2 relative z-10"><span class="text-green-500">➕</span> Add New Product</h2>
            
            <form id="add-product-form" class="space-y-5 relative z-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Product Name</label>
                        <input type="text" id="prod-name" required class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-sm font-bold outline-none focus:ring-2 focus:ring-green-500 transition-shadow" placeholder="e.g. Simba Cement 50kg">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Category</label>
                        <select id="prod-category" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-sm font-bold outline-none focus:ring-2 focus:ring-green-500 transition-shadow text-gray-700">
                            <option value="Foundation & Structural">Foundation & Structural</option>
                            <option value="Roofing Materials">Roofing Materials</option>
                            <option value="Finishing & Painting">Finishing & Painting</option>
                            <option value="Tools & Hardware">Tools & Hardware</option>
                            <option value="Plumbing">Plumbing</option>
                            <option value="Electrical">Electrical</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Price (TZS)</label>
                        <input type="number" id="prod-price" required class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-sm font-bold outline-none focus:ring-2 focus:ring-green-500 transition-shadow" placeholder="18500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Weight per unit (KG)</label>
                        <input type="number" id="prod-weight" required class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-sm font-bold outline-none focus:ring-2 focus:ring-green-500 transition-shadow" placeholder="50">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Short Description</label>
                    <input type="text" id="prod-desc" required class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-sm font-bold outline-none focus:ring-2 focus:ring-green-500 transition-shadow" placeholder="Grade 42.5R high-strength cement.">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Product Image (High Quality)</label>
                    <div class="w-full bg-gray-50 border border-gray-200 border-dashed rounded-2xl p-4 hover:bg-gray-100 transition-colors">
                        <input type="file" id="prod-image" accept="image/*" required class="w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-xs file:font-black file:uppercase file:tracking-widest file:bg-green-100 file:text-green-700 hover:file:bg-green-200 cursor-pointer">
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-5 mt-2 bg-gray-900 hover:bg-black text-white rounded-2xl font-black shadow-xl transition-colors flex items-center justify-center gap-2 click-press uppercase tracking-widest text-sm">
                    ☁️ Publish to Live Store
                </button>
            </form>
        </div>

        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
            <h2 class="text-lg font-black mb-6 flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></span> My Live Products</h2>
            <div id="inventory-list" class="space-y-4">
                <div class="text-center py-10">
                    <p class="text-sm text-gray-400 font-bold animate-pulse">Loading secure inventory...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCX2C1TXRb20nGtxEaYXGUo2KEH7gbZCY0", 
            authDomain: "ujenzismart-878af.firebaseapp.com", 
            projectId: "ujenzismart-878af", 
            storageBucket: "ujenzismart-878af.firebasestorage.app", 
            messagingSenderId: "626807014511", 
            appId: "1:626807014511:web:844e137d32048d6460399a",
            measurementId: "G-V8C9KKGKFY" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app); 
        const provider = new GoogleAuthProvider();

        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const submitBtn = document.getElementById('submit-btn');

        // 🚨 THE VIP GUEST LIST 🚨
        // REPLACE THIS EMAIL WITH YOUR ACTUAL GOOGLE ACCOUNT!
        const APPROVED_SUPPLIERS = [
            "jem.mziray@gmail.com",
            "venancechesco58@gmail.com",
            "another.partner@example.com"
        ];

        // AUTHENTICATION LISTENER
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // THE BOUNCER
                if (!APPROVED_SUPPLIERS.includes(user.email)) {
                    alert("⛔ Unauthorized Access! You are not an approved UjenziSmart supplier.");
                    await signOut(auth);
                    return; 
                }

                loginScreen.classList.add('hidden');
                dashboardScreen.classList.remove('hidden');
                document.getElementById('supplier-name').textContent = user.displayName + " (" + user.email + ")";
                listenToInventory(user.uid);
            } else {
                loginScreen.classList.remove('hidden');
                dashboardScreen.classList.add('hidden');
            }
        });

        // FIXED: The missing Click Listeners!
        document.getElementById('google-login-btn').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error(error);
                alert("Login failed: " + error.message);
            }
        };
        
        document.getElementById('logout-btn').onclick = async () => {
            await signOut(auth);
        };

        // UPLOAD NEW PRODUCT
        document.getElementById('add-product-form').onsubmit = async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if(!user) return alert("Please sign in first.");

            const file = document.getElementById('prod-image').files[0];
            if(!file) return alert("Please select an image.");

            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = "⏳ Uploading Image...";
            submitBtn.disabled = true;

            try {
                const storageRef = ref(storage, 'products/' + user.uid + '_' + Date.now() + '_' + file.name);
                await uploadBytes(storageRef, file);
                
                submitBtn.innerHTML = "⏳ Generating Link...";
                const downloadURL = await getDownloadURL(storageRef);

                submitBtn.innerHTML = "⏳ Saving to Database...";
                await addDoc(collection(db, "products"), {
                    supplierId: user.uid,
                    supplierName: user.displayName,
                    name: document.getElementById('prod-name').value,
                    category: document.getElementById('prod-category').value,
                    price: Number(document.getElementById('prod-price').value),
                    weight: Number(document.getElementById('prod-weight').value),
                    desc: document.getElementById('prod-desc').value,
                    img: downloadURL, 
                    rating: 5.0, 
                    reviews: 0,
                    reviewTxt: "Verified product from authorized vendor.",
                    createdAt: serverTimestamp()
                });

                alert("✅ Product published successfully!");
                document.getElementById('add-product-form').reset();
            } catch (error) {
                console.error("Upload Error:", error);
                alert("Failed to upload. Check console.");
            } finally {
                submitBtn.innerHTML = "☁️ Publish to Live Store";
                submitBtn.disabled = false;
            }
        };

        // LISTEN TO INVENTORY
        function listenToInventory(uid) {
            const q = query(collection(db, "products"), where("supplierId", "==", uid));
            
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('inventory-list');
                let items = [];
                snapshot.forEach((doc) => {
                    items.push({ id: doc.id, ...doc.data() });
                });

                if(items.length === 0) {
                    list.innerHTML = `
                    <div class="text-center py-10 bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                        <p class="text-3xl mb-2">📦</p>
                        <p class="text-sm text-gray-400 font-bold">You have no products live.</p>
                    </div>`;
                    return;
                }

                list.innerHTML = items.map(p => `
                    <div class="flex items-center gap-4 p-4 border border-gray-100 rounded-2xl bg-gray-50 hover:bg-gray-100 transition-colors group">
                        <img src="${p.img}" class="w-16 h-16 object-cover rounded-xl border border-gray-200 shadow-sm">
                        <div class="flex-grow">
                            <p class="font-black text-sm text-gray-800">${p.name}</p>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">${p.category}</p>
                            <p class="text-green-600 font-black text-sm mt-1">TZS ${p.price.toLocaleString()}</p>
                        </div>
                        <button onclick="deleteProduct('${p.id}')" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-3 rounded-xl transition-colors" title="Remove Product">🗑️</button>
                    </div>
                `).join('');
            });
        }

        // DELETE PRODUCT
        window.deleteProduct = async function(docId) {
            if(confirm("Are you sure you want to remove this product from the live store?")) {
                try {
                    await deleteDoc(doc(db, "products", docId));
                } catch(e) {
                    console.error("Delete error:", e);
                    alert("Failed to delete.");
                }
            }
        };
    </script>
</body>
</html>
